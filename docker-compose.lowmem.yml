# =====================================================
# RSS-Post Docker Compose 低内存配置
# 适用于 1GB-2GB 内存的服务器
# 使用方式：docker-compose -f docker-compose.lowmem.yml up -d
# =====================================================

services:
  # PostgreSQL 数据库（限制内存使用）
  postgres:
    image: postgres:16-alpine
    container_name: rss-post-db
    environment:
      POSTGRES_USER: rss_post
      POSTGRES_PASSWORD: rss_post_password
      POSTGRES_DB: rss_post
      # 限制 PostgreSQL 内存使用
      POSTGRES_SHARED_BUFFERS: "128MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "256MB"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rss_post"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存和队列（限制内存使用）
  redis:
    image: redis:7-alpine
    container_name: rss-post-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用服务（低内存构建）
  app:
    build:
      context: .
      dockerfile: Dockerfile.lowmem
      args:
        - NODE_OPTIONS=--max-old-space-size=1024
      # 启用 BuildKit 缓存
      cache_from:
        - type=local,src=/tmp/docker-cache
      cache_to:
        type=local,dest=/tmp/docker-cache
    image: rss-post-app:lowmem
    container_name: rss-post-app
    ports:
      - "8915:3000"
    environment:
      # 数据库（容器内部通信）
      DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
      REDIS_URL: redis://redis:6379
      # 应用 URL（可按需修改）
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:8915}
      APP_URL: ${APP_URL:-http://localhost:8915}
      # Cookie 安全设置（HTTP 环境设为 false，HTTPS 环境设为 true）
      SECURE_COOKIE: ${SECURE_COOKIE:-false}
      # AI 配置（启动后在界面中配置，此处仅设默认值）
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CUSTOM_API_BASE_URL: ${CUSTOM_API_BASE_URL:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_API_MODEL: ${CUSTOM_API_MODEL:-}
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 数据库初始化服务（使用预构建镜像，不再重新构建）
  init:
    image: rss-post-app:lowmem
    container_name: rss-post-init
    user: root
    environment:
      DATABASE_URL: postgresql://rss_post:rss_post_password@postgres:5432/rss_post
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Running Prisma generate...' &&
        pnpm exec prisma generate &&
        echo 'Running database migrations...' &&
        pnpm exec prisma db push --accept-data-loss &&
        echo 'Seeding initial data...' &&
        pnpm exec tsx prisma/seed.ts &&
        echo 'Initialization complete!'
      "
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: "no"

volumes:
  postgres_data:
  redis_data:
